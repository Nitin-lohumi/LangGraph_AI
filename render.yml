services:
  - type: web
    name: ai-chatbot
    env: node
    buildCommand: npm install --legacy-peer-deps && npm run build
    startCommand: npm start
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: QDRANT_DB_ENDPOINT
        sync: false
      - key: QDRANT_API_KEY
        sync: false
      - key: HUGGINGFACE_API_TOKEN
        sync: false
      - key: NODE_ENV
        value: production